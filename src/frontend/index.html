<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Templates with Variables</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Import Template Button -->
    <button class="btn btn-icon" id="importTemplateBtn" title="Import template">
        <svg version="1.1" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
        </svg>
    </button>

    <!-- Theme Settings Button -->
    <button class="btn btn-icon" id="themeSettingsBtn" title="Theme settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
        </svg>
    </button>

    <div class="app-container">
        <!-- Sidebar: Template List -->
        <aside class="sidebar" id="sidebar">

            <div class="search-section">
                <input type="text" id="templateSearch" placeholder="Search templates..." class="search-input">
            </div>

            <button class="btn btn-primary" id="createTemplateBtn">
                <svg width="16" height="16" fill="currentColor" class="icon" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
                </svg>
                New Template
            </button>

            <div class="template-list" id="templateList">
                <!-- Templates will be loaded here dynamically -->
                <div class="loading">Loading templates...</div>
            </div>

            
            
            <!-- Resize handle -->
            <div class="resize-handle" id="resizeHandle"></div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header with template actions -->
            <header class="content-header">
                <div class="template-info">
                    <h1 id="templateTitle">Select a template</h1>
                </div>
                
                <div class="template-actions">
                    <button class="btn btn-secondary" id="editTemplateBtn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="icon" viewBox="0 0 16 16">
                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary" id="exportTemplateBtn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="icon" viewBox="0 0 16 16">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
                            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
                        </svg>
                    </button>
                    <button class="btn btn-danger" id="deleteTemplateBtn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="icon" viewBox="0 0 16 16">
                            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                            <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Single Content Area  -->
            <div class="content-container">
                    <!-- View Mode Content Display -->
                    <div id="viewContent" class="view-content active">
                        <div class="template-meta">
                            <span id="templateCategory" class="category-badge"></span>
                            <span id="templateModified" class="last-modified"></span>
                        </div>
                        <div id="templateDescriptionDisplay" class="template-description"></div>
                        <div class="template-content-container">
                            <div id="templateContentDisplay" class="template-content"></div>
                            <button id="copyButton" class="copy-button" title="Copy template content">
                                <!-- <span class="copy-icon">⧉</span> -->
                                <svg class="copy-icon" aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true">
                                    <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path>
                                    <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
                                </svg>
                                <!-- <span class="check-icon">✓</span> -->
                                <svg class="check-icon" aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true">
                                    <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"></path>
                                </svg>
                                <svg class="warning-icon" stroke-width="1.5" aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" version="1.1" data-view-component="true">
                                    <path d="M7.938 2.016a.13.13 0 0 1 .125 0l6.857 11.856a.25.25 0 0 1-.22.365H1.281a.25.25 0 0 1-.22-.365L7.938 2.016z" fill="none" stroke="currentColor" />
                                    <line x1="8" y1="6" x2="8" y2="10" stroke="currentColor" stroke-linecap="round" />
                                    <circle cx="8" cy="12.5" r="0.5" fill="currentColor" />
                                </svg>
                            </button>
                            <span class="copy-feedback" id="copyFeedback">Copied!</span>
                            <span class="copy-feedback warning-feedback" id="copyWithWarningFeedback">Copied with variable placeholders as some values are not provided!</span>
                        </div>
                    </div>
                    
                    <!-- Edit Mode Content Form -->
                    <div id="editContent" class="edit-content">
                        <!-- Dynamic edit elements will be created here -->
                    </div>
            </div>
        </main>

        <!-- Variable Inputs Section (will be redesigned in Phase 4) -->
        <div class="variable-inputs-section" id="variableInputsSection">
            <h3>Variables</h3>
            <div class="variable-inputs" id="variableInputs">
                <p class="no-variables"></p>
            </div>
        </div>
    </div>


    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <!-- Scripts -->
    <script type="module" src="scripts/main.ts"></script>
    <script>
        // Button click animations
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if (!this.disabled) {
                    this.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 100);
                }
            });
        });
    </script>
</body>
</html>
