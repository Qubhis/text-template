services:
  text-template:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: text-template-app
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 only for security (localhost only)
      - "127.0.0.1:3010:3010"
    volumes:
      # Mount data directory for persistent storage
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATA_DIR=/app/data
    # Security enhancements
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3010/health').then(r => r.status === 200 ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
